<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBFAF7"/>
      <stop offset="100%" stop-color="#F4F1EA"/>
    </linearGradient>
    <radialGradient id="glow" cx="85%" cy="15%" r="55%">
      <stop offset="0%" stop-color="#1F4D3F" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#1F4D3F" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#E6E3DC" stroke-width=".5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity=".6"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Brand -->
  <g transform="translate(80, 80)">
    <rect width="56" height="56" rx="14" fill="#1F4D3F"/>
    <text x="28" y="42" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="36" fill="#FBFAF7">R</text>
    <text x="76" y="40" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="600" fill="#0E0E0E">RentSamu</text>
    <text x="76" y="62" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#5C5C57" letter-spacing="2">INTELIGENCIA DE PRECIOS &middot; ALQUILER MADRID</text>
  </g>

  <!-- H1 -->
  <text x="80" y="240" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="400" fill="#0E0E0E" letter-spacing="-1.5">El precio justo</text>
  <text x="80" y="316" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="400" fill="#0E0E0E" letter-spacing="-1.5">del alquiler en Madrid,</text>
  <text x="80" y="392" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="72" font-weight="400" fill="#1F4D3F" letter-spacing="-1.5">calculado con datos.</text>

  <!-- KPI strip -->
  <g transform="translate(80, 470)">
    <line x1="0" y1="0" x2="1040" y2="0" stroke="#D6D2C8" stroke-width="1"/>

    <g transform="translate(0, 30)">
      <text font-family="ui-monospace, Menlo, monospace" font-size="42" font-weight="500" fill="#0E0E0E" letter-spacing="-1">301</text>
      <text x="78" y="-1" font-family="ui-monospace, Menlo, monospace" font-size="20" fill="#5C5C57">€</text>
      <text y="34" font-family="Inter, sans-serif" font-size="13" fill="#5C5C57">MAE holdout precio</text>
    </g>

    <g transform="translate(225, 30)">
      <text font-family="ui-monospace, Menlo, monospace" font-size="42" font-weight="500" fill="#0E0E0E" letter-spacing="-1">0,80</text>
      <text y="34" font-family="Inter, sans-serif" font-size="13" fill="#5C5C57">R² holdout</text>
    </g>

    <g transform="translate(385, 30)">
      <text font-family="ui-monospace, Menlo, monospace" font-size="42" font-weight="500" fill="#0E0E0E" letter-spacing="-1">8.797</text>
      <text y="34" font-family="Inter, sans-serif" font-size="13" fill="#5C5C57">Inmuebles entrenamiento</text>
    </g>

    <g transform="translate(605, 30)">
      <text font-family="ui-monospace, Menlo, monospace" font-size="42" font-weight="500" fill="#0E0E0E" letter-spacing="-1">21</text>
      <text y="34" font-family="Inter, sans-serif" font-size="13" fill="#5C5C57">Distritos cubiertos</text>
    </g>

    <g transform="translate(720, 30)">
      <text font-family="ui-monospace, Menlo, monospace" font-size="42" font-weight="500" fill="#0E0E0E" letter-spacing="-1">10+</text>
      <text y="34" font-family="Inter, sans-serif" font-size="13" fill="#5C5C57">Fuentes externas</text>
    </g>

    <g transform="translate(840, 30)">
      <text font-family="ui-monospace, Menlo, monospace" font-size="42" font-weight="500" fill="#1F4D3F" letter-spacing="-1">87%</text>
      <text y="34" font-family="Inter, sans-serif" font-size="13" fill="#5C5C57">Cobertura P5–P95</text>
    </g>
  </g>

  <!-- Hex motif right side -->
  <g transform="translate(880, 100)" opacity=".95">
    <path d="M70 0 L121 30 L121 90 L70 120 L19 90 L19 30 Z" fill="#1F4D3F"/>
    <text x="70" y="68" text-anchor="middle" font-family="Georgia, serif" font-size="32" fill="#FBFAF7">23,7</text>
    <text x="70" y="92" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="rgba(251,250,247,0.7)">€/m²</text>
  </g>
  <g transform="translate(980, 200)" opacity=".75">
    <path d="M50 0 L87 22 L87 65 L50 87 L13 65 L13 22 Z" fill="#3E907A"/>
    <text x="50" y="48" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#FBFAF7">22,6</text>
  </g>
  <g transform="translate(810, 240)" opacity=".55">
    <path d="M40 0 L70 18 L70 52 L40 70 L10 52 L10 18 Z" fill="#52B59C"/>
    <text x="40" y="40" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#0E0E0E">23,4</text>
  </g>
</svg>
